services:
  # PHP App
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - laravel

  # PHPMyAdmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: ariadev
      PMA_PASSWORD: 12345
    networks:
      - laravel

  # Nginx
  webserver:
    image: nginx:alpine
    container_name: webserver
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./nginx/eskoylar.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel

  # MySQL
  db:
    image: mysql:8.4
    container_name: db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: scholarship_ms
      MYSQL_ROOT_PASSWORD: 123
      MYSQL_PASSWORD: 12345
      MYSQL_USER: ariadev
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - laravel

networks:
  laravel:
    driver: bridge

volumes:
  dbdata:
    driver: local
